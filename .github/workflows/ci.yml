name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run Backend Tests with Coverage
        run: cd backend && npm run coverage

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run Frontend Tests with Coverage
        run: cd frontend && npm run coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Backend deps
        run: cd backend && npm ci
      
      - name: Install Frontend deps
        run: cd frontend && npm ci
      
      - name: Install Cypress deps
        run: cd cypress && npm ci

      - name: Run E2E Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: cypress
          start: npm start --prefix ../backend, npm run dev --prefix ../frontend
          wait-on: 'http://127.0.0.1:5173'
          # Force IPv4 for the start commands in the action context
          command: npx cypress run --spec cypress/e2e/plants.cy.js
